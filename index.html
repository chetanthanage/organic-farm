/* ════ CART UTILS ════ */
function loadCart(){try{return JSON.parse(localStorage.getItem("organicCart"))||[];}catch{return [];}}
function saveCart(c){localStorage.setItem("organicCart",JSON.stringify(c));}
function cartTotal(c){return c.reduce((s,i)=>s+Number(i.price)*Number(i.quantity),0);} // price is already for selected qty size
function cartCount(c){return c.reduce((s,i)=>s+Number(i.quantity),0);}

/* ════ HOOKS ════ */
function useCart(){
  const [cart,setCart]=React.useState(()=>loadCart());
  React.useEffect(()=>{saveCart(cart);},[cart]);
  const addToCart=React.useCallback((p, qtyData)=>{
    // qtyData = { grams, displayQty, price } from SmartQtySelector
    // Each selection is a unique line item (keyed by id + grams)
    const lineKey = `${p.id}_${qtyData.grams}`;
    setCart(prev=>{
      const ex=prev.find(i=>i.lineKey===lineKey);
      if(ex){
        // Same product + same quantity: just bump count
        return prev.map(i=>i.lineKey===lineKey?{...i,count:(i.count||1)+1}:i);
      }
      return [...prev,{
        lineKey,
        id:       p.id,
        name:     p.name,
        nameEn:   p.nameEn,
        image:    p.image,
        price:    qtyData.price,        // computed price for selected qty
        unit:     qtyData.displayQty,  // e.g. "250g", "1.5kg"
        grams:    qtyData.grams,
        quantity: 1,                   // how many packs of this size
        count:    1,
      }];
    });
  },[]);
  const updateQty=React.useCallback((lineKey,delta)=>{
    setCart(prev=>prev
      .map(i=>i.lineKey===lineKey?{...i,quantity:Math.max(0,Number(i.quantity)+delta)}:i)
      .filter(i=>i.quantity>0)
    );
  },[]);
  const removeItem=React.useCallback((lineKey)=>setCart(prev=>prev.filter(i=>i.lineKey!==lineKey)),[]);
  const clearCart=React.useCallback(()=>setCart([]),[]);
  return{cart,addToCart,updateQty,removeItem,clearCart};
}

function useToast(){
  const [toast,setToast]=React.useState({show:false,msg:""});
  const ref=React.useRef(null);
  const show=React.useCallback((msg)=>{
    if(ref.current)clearTimeout(ref.current);
    setToast({show:true,msg});
    ref.current=setTimeout(()=>setToast({show:false,msg:""}),2600);
  },[]);
  return{toast,showToast:show};
}

function useCountUp(target, duration){
  duration = duration || 1400;
  const [value,setValue] = React.useState(0);
  React.useEffect(()=>{
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(reduce){ setValue(target); return; }
    let frame; let start = null;
    const ease = t => 1 - Math.pow(1-t,3);
    const step = ts => {
      if(start===null) start = ts;
      const p = Math.min((ts-start)/duration, 1);
      setValue(Math.round(target*ease(p)));
      if(p < 1) frame = requestAnimationFrame(step);
    };
    frame = requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(frame);
  },[target,duration]);
  return value;
}

function StatCard({value,suffix,label,delay}){
  const count = useCountUp(value);
  return(
    <div className="stat-card animate-in" style={{animationDelay:delay}}>
      <div className="stat-num">{count}{suffix}</div>
      <div className="stat-lbl">{label}</div>
    </div>
  );
}

/* ════ SMART QUANTITY SELECTOR ════
   - Quick chips: 100g 250g 500g 1kg 2kg 5kg
   - Custom input: any gram or kg value
   - Unit dropdown: Gram / Kilogram
   - Live price calculation based on base price/quantity
   ═══════════════════════════════════════════ */

/* Helper: parse product base quantity to grams */
/* ════════════════════════════════════════════════════════
   SMART QTY HELPERS
   ════════════════════════════════════════════════════════ */

/* Parse product base quantity string → grams */
function parseBaseGrams(qtyStr){
  const s=(qtyStr||"").toLowerCase().replace(/\s/g,"");
  if(s.includes("kg")){const n=parseFloat(s);return isNaN(n)?1000:n*1000;}
  if(s.includes("g")){const n=parseFloat(s);return isNaN(n)?500:n;}
  if(s.includes("litre")||s.includes("ltr")){return parseFloat(s)*1000||1000;}
  if(s.includes("dozen")||s.includes("pcs")){return 1;}
  return 500;
}

/* Format grams → display string */
function fmtQty(grams,unit){
  if(unit==="kg"){const kg=grams/1000;return `${parseFloat(kg.toFixed(2))}kg`;}
  return grams>=1000?`${parseFloat((grams/1000).toFixed(2))}kg`:`${grams}g`;
}

/* Quick-select chip definitions */
const CHIPS=[
  {label:"100g", g:100},
  {label:"250g", g:250},
  {label:"500g", g:500},
  {label:"1kg",  g:1000},
  {label:"2kg",  g:2000},
  {label:"5kg",  g:5000},
];

/* ════════════════════════════════════════════════════════
   QTY MODAL
   ─ Renders as a fixed portal on top of everything
   ─ Backdrop: dimmed + blurred page behind
   ─ Panel: slides up from bottom (mobile) / scales in (desktop)
   ─ Product card stays fully visible in background
   ════════════════════════════════════════════════════════ */
function QtyModal({product, onConfirm, onClose}){
  const baseGrams = parseBaseGrams(product.quantity);
  const basePrice = Number(product.price);

  const [unit,       setUnit]       = React.useState("g");
  const [selG,       setSelG]       = React.useState(baseGrams);
  const [custom,     setCustom]     = React.useState(String(baseGrams));
  const [activeChip, setActiveChip] = React.useState(baseGrams);
  const [closing,    setClosing]    = React.useState(false);

  /* Live price = (selected g / base g) × base price */
  const livePrice = React.useMemo(()=>{
    const ratio = selG / baseGrams;
    return Math.round(ratio * basePrice);
  },[selG, baseGrams, basePrice]);

  /* Animated close — play closing animation then call onClose */
  const handleClose = () => {
    setClosing(true);
    setTimeout(onClose, 210);
  };

  /* Close on backdrop click */
  const handleBackdropClick = (e) => {
    if(e.target === e.currentTarget) handleClose();
  };

  /* Close on Escape key */
  React.useEffect(()=>{
    const onKey = (e) => { if(e.key==="Escape") handleClose(); };
    document.addEventListener("keydown", onKey);
    /* Prevent body scroll while modal open */
    document.body.style.overflow = "hidden";
    return ()=>{
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  },[]);

  const selectChip = (g) => {
    setSelG(g);
    setActiveChip(g);
    setCustom(unit==="kg" ? String(g/1000) : String(g));
  };

  const handleUnit = (e) => {
    const u = e.target.value;
    setUnit(u);
    setCustom(u==="kg" ? String(selG/1000) : String(selG));
  };

  const handleCustom = (e) => {
    const val = e.target.value;
    setCustom(val);
    setActiveChip(null);
    const num = parseFloat(val);
    if(!isNaN(num) && num > 0){
      setSelG(unit==="kg" ? Math.round(num*1000) : Math.round(num));
    }
  };

  const handleConfirm = () => {
    onConfirm({
      grams:      selG,
      displayQty: fmtQty(selG, unit),
      price:      livePrice,
    });
    handleClose();
  };

  return(
    <div
      className={`qty-modal-backdrop${closing?" closing":""}`}
      onClick={handleBackdropClick}
    >
      <div className="qty-modal" onClick={e=>e.stopPropagation()}>

        {/* Drag handle pill (mobile UX) */}
        <div className="qty-modal-handle"/>

        {/* Green header with product info */}
        <div className="qty-modal-header">
          <div className="qm-product-img">
            <img
              src={product.image}
              alt={product.name}
              onError={e=>{e.target.src="images/Organic_Product.jpg";}}
            />
          </div>
          <div className="qm-title-wrap">
            <div className="qm-name">{product.name}</div>
            <div className="qm-namehi">{product.nameEn}</div>
            <div className="qm-base">Base price: ₹{basePrice} / {product.quantity}</div>
          </div>
          <button className="qty-close-btn" onClick={handleClose} aria-label="Close">
            <i className="fa-solid fa-xmark"/>
          </button>
        </div>

        {/* Body */}
        <div className="qty-modal-body">

          {/* Quantity input row */}
          <div className="qm-label">Quantity</div>
          <div className="qm-input-row">
            <input
              className="qm-num-input"
              type="number"
              min="1"
              step={unit==="kg"?"0.25":"50"}
              value={custom}
              onChange={handleCustom}
              placeholder={unit==="kg"?"e.g. 1 Kg":"e.g. 500 Gram"}
              autoFocus
            />
            <select className="qm-unit-sel" value={unit} onChange={handleUnit}>
              <option value="g">Gram</option>
              <option value="kg">Kilogram</option>
            </select>
          </div>

          {/* Quick select chips */}
          <div className="qm-label">Quick Select</div>
          <div className="qm-chips">
            {CHIPS.map(chip=>(
              <button
                key={chip.g}
                className={`qm-chip${activeChip===chip.g?" active":""}`}
                onClick={()=>selectChip(chip.g)}
              >
                {chip.label}
              </button>
            ))}
          </div>

          {/* Live summary */}
          <div className="qm-summary">
            <div className="qm-sum-left">
              <div className="lbl">Selected</div>
              <div className="val">{fmtQty(selG, unit)}</div>
            </div>
            <div className="qm-sum-right">
              <div className="lbl">Price</div>
              <div className="val">₹{livePrice}</div>
            </div>
          </div>
        </div>

        {/* Action buttons */}
        <div className="qm-actions">
          <button className="qm-confirm-btn" onClick={handleConfirm}>
            <i className="fa-solid fa-circle-check"/>
            Add to Cart
          </button>
          <button className="qm-cancel-btn" onClick={handleClose}>
            Cancel
          </button>
        </div>

      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   PRODUCT CARD
   ─ Compact card always visible
   ─ Click "Add To Cart" → open QtyModal as fixed overlay
   ─ Product card remains fully visible in background
   ════════════════════════════════════════════════════════ */
function ProductCard({product, onAdd}){
  const [modalOpen, setModalOpen] = React.useState(false);
  const [justAdded, setJustAdded] = React.useState(false);

  const handleConfirm = (qtyData) => {
    onAdd(product, qtyData);
    setJustAdded(true);
    setTimeout(()=>setJustAdded(false), 1800);
  };

  return(
    <>
      {/* ── Compact product card — always visible ── */}
      <div className="product-card">
        <div className="p-img">
          <img
            src={product.image}
            alt={product.name}
            loading="lazy"
            onError={e=>{e.target.src="images/Organic_Product.jpg";}}
          />
        </div>
        <div className="p-body">
          <div className="p-name">{product.name}</div>
          <div className="p-name-hi">{product.nameEn}</div>
          <div className="p-price-main">
            ₹{product.price}
            <span className="p-price-unit">/ {product.quantity}</span>
          </div>
          <button
            className="add-btn"
            style={justAdded?{background:"linear-gradient(135deg,#1a7a4a,#27ae60)"}:{}}
            onClick={()=>setModalOpen(true)}
          >
            <i className={`fa-solid ${justAdded?"fa-check":"fa-cart-plus"}`}/>
            {justAdded?"Added!":"Select Product"}
          </button>
        </div>
      </div>

      {/* ── Qty Modal — portal-style, outside card DOM flow ── */}
      {modalOpen && (
        <QtyModal
          product={product}
          onConfirm={handleConfirm}
          onClose={()=>setModalOpen(false)}
        />
      )}
    </>
  );
}

/* ════ CART PAGE ════ */
function CartPage({cart,updateQty,removeItem,clearCart,setPage,showToast}){
  const [form,setF]=React.useState({name:"",phone:"",address:"",pin:""});
  const [errs,setE]=React.useState({});
  const [modal,setModal]=React.useState(false);
  const [confirmedOrder,setConfirmed]=React.useState(null);

  const total=cartTotal(cart);
  const count=cartCount(cart);

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name="Name required";
    if(!form.phone.trim()) e.phone="Phone required";
    else if(!/^\d{10}$/.test(form.phone.replace(/\s/g,""))) e.phone="Enter valid 10-digit number";
    if(!form.address.trim()) e.address="Address required";
    if(!form.pin.trim()) e.pin="Pin code required";
    else if(!/^\d{6}$/.test(form.pin.trim())) e.pin="Enter valid 6-digit pin code";
    return e;
  };

  const handleConfirm=()=>{
    if(cart.length===0){showToast("Cart is empty!");return;}
    const e=validate(); setE(e);
    if(!Object.keys(e).length){setConfirmed({...form});setModal(true);}
  };

  /* ── WhatsApp message builder — numbered list, qty on next line ── */
  const buildWAMsg=()=>{
    /* ── Format:
       🛒 ORGANIC FARM ORDER

       👤 Customer Details
       Name     : ...
       Phone    : ...
       Address  : ...
       Pin Code : ...

       📦 Items Ordered

       1) राजमा (Rajma)
       ➜ Qty: 1kg
       2) मसूर डाळ (Masur Dal)
       ➜ Qty: 500g

       💰 Final Total : ₹130

       ✅ Thank You For Ordering
    ── */
    let msg = "🛒 *ORGANIC FARM ORDER*\n\n";
    msg += "👤 *Customer Details*\n";
    msg += `Name     : ${form.name}\n`;
    msg += `Phone    : ${form.phone}\n`;
    msg += `Address  : ${form.address}\n`;
    msg += `Pin Code : ${form.pin}\n\n`;
    msg += "📦 *Items Ordered*\n\n";
    cart.forEach((item, idx) => {
      const qty_display = item.quantity > 1 ? `${item.unit} × ${item.quantity}` : item.unit;
      msg += `${idx + 1}) ${item.name} (${item.nameEn})\n`;
      msg += `➜ Qty: ${qty_display}\n\n`;
    });
    msg += `💰 *Final Total : ₹${total}*\n\n`;
    msg += "✅ Thank You For Ordering";
    return msg;
  };

  const handleWA=()=>{
    const msg=buildWAMsg();
    // Open WhatsApp first, then clear cart so order data is safe
    const waOpened = window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`,"_blank");
    // Only clear if window opened successfully
    if(waOpened !== null){
      clearCart();
      setModal(false);
      setPage("home");
      showToast("Order sent on WhatsApp! 🎉");
    } else {
      // Fallback: location.href for mobile browsers that block window.open
      window.location.href=`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`;
      clearCart();
      setModal(false);
      setPage("home");
      showToast("Order sent on WhatsApp! 🎉");
    }
  };

  return(
    <div className="cart-page">
      <div className="cart-hdr">
        <div className="container">
          <h1>🛒 Your Cart</h1>
          <p>{count>0?`${count} item${count>1?"s":""} in cart`:"Your cart is empty"}</p>
        </div>
      </div>

      <div className="cart-layout">
        {/* Items Column */}
        <div className="cart-col">
          {cart.length===0?(
            <div className="empty-cart">
              <div className="ec-ico">🛒</div>
              <h2>Cart is Empty</h2>
              <p>Add fresh organic products from our farm!</p>
              <button onClick={()=>setPage("home")} style={{padding:"13px 30px",background:"linear-gradient(135deg,var(--green-deep),var(--green))",color:"#fff",border:"none",borderRadius:"14px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:".9rem",marginTop:"4px"}}>
                <i className="fa-solid fa-basket-shopping" style={{marginRight:"8px"}}/>Continue Shopping
              </button>
            </div>
          ):(
            <>
              {cart.map(item=>(
                <div className="cart-card" key={item.id}>
                  <div className="c-item-img">
                    <img src={item.image} alt={item.name} onError={e=>{e.target.src="images/Organic_Product.jpg";}}/>
                  </div>
                  <div className="c-item-info">
                    <div className="c-item-name">{item.name}</div>
                    <div className="c-item-unit">{item.nameEn} · <strong style={{color:"var(--green)"}}>{item.unit}</strong> · ₹{item.price} per pack</div>
                    <div className="qty-sel" style={{marginTop:"8px"}}>
                      <button className="q-btn" onClick={()=>updateQty(item.lineKey,-1)}>−</button>
                      <div className="q-val">{item.quantity}</div>
                      <button className="q-btn" onClick={()=>updateQty(item.lineKey,1)}>+</button>
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"10px",flexShrink:0}}>
                    <div className="c-item-price">₹{Number(item.price)*Number(item.quantity)}</div>
                    <button className="c-item-rem" onClick={()=>{removeItem(item.lineKey);showToast(`${item.name} removed`);}}><i className="fa-solid fa-trash"/></button>
                  </div>
                </div>
              ))}
              <button onClick={()=>{clearCart();showToast("Cart cleared");}} style={{padding:"11px",background:"#fff0ef",color:"var(--red)",border:"none",borderRadius:"12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:".82rem"}}>
                <i className="fa-solid fa-trash" style={{marginRight:"7px"}}/>Clear Cart
              </button>
            </>
          )}
        </div>

        {/* Summary + Checkout */}
        <div>
          <div className="summary-card">
            <div className="sum-title">Order Summary</div>
            <div className="sum-row"><span>Total Items</span><strong>{count}</strong></div>
            <div className="sum-row"><span>Subtotal</span><strong>₹{total}</strong></div>
            <div className="sum-total"><span>Grand Total</span><span>₹{total}</span></div>

            <div className="checkout-sec">
              <h3>📋 Delivery Details</h3>

              <div className="fg">
                <label>Customer Name *</label>
                <input type="text" placeholder="Ramesh Patil" value={form.name} className={errs.name?"err":""} onChange={e=>{setF({...form,name:e.target.value});setE({...errs,name:""}); }}/>
                {errs.name&&<div className="ferr">{errs.name}</div>}
              </div>

              <div className="fg">
                <label>Mobile Number *</label>
                <input type="tel" placeholder="10-digit number" value={form.phone} className={errs.phone?"err":""} maxLength={10} onChange={e=>{setF({...form,phone:e.target.value});setE({...errs,phone:""}); }}/>
                {errs.phone&&<div className="ferr">{errs.phone}</div>}
              </div>

              <div className="fg">
                <label>Full Address *</label>
                <input type="text" placeholder="House no, Street, Village/City" value={form.address} className={errs.address?"err":""} onChange={e=>{setF({...form,address:e.target.value});setE({...errs,address:""}); }}/>
                {errs.address&&<div className="ferr">{errs.address}</div>}
              </div>

              <div className="fg">
                <label>Pin Code *</label>
                <input type="text" placeholder="422001" value={form.pin} className={errs.pin?"err":""} maxLength={6} onChange={e=>{setF({...form,pin:e.target.value});setE({...errs,pin:""}); }}/>
                {errs.pin&&<div className="ferr">{errs.pin}</div>}
              </div>

              <button className="conf-btn" onClick={handleConfirm} disabled={cart.length===0}>
                <i className="fa-solid fa-check-circle"/>Confirm Order
              </button>

              <div className="trust-badges">
                <div className="trust-badge"><span>🌿</span>100% Organic Products</div>
                <div className="trust-badge"><span>🔒</span>Secure WhatsApp Ordering</div>
                <div className="trust-badge"><span>🚚</span>Fresh Farm Delivery</div>
              </div>
            </div>
          </div>
          <div style={{textAlign:"center",marginTop:"14px"}}>
            <button onClick={()=>setPage("home")} style={{padding:"10px 22px",background:"transparent",color:"var(--green)",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:".85rem"}}>
              ← Continue Shopping
            </button>
          </div>
        </div>
      </div>

      {modal&&confirmedOrder&&(
        <OrderModal order={confirmedOrder} cart={cart} onClose={()=>setModal(false)} onWA={handleWA}/>
      )}
    </div>
  );
}

/* ════ APP ROOT ════ */
function App(){
  const [page,setPage]=React.useState("home");
  const {cart,addToCart,updateQty,removeItem,clearCart}=useCart();
  const {toast,showToast}=useToast();
  const count=cartCount(cart);

  React.useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[page]);

  React.useEffect(()=>{
    const update=()=>{
      const el=document.getElementById("progressBar");
      if(!el) return;
      const st=document.documentElement.scrollTop;
      const sh=document.documentElement.scrollHeight-document.documentElement.clientHeight;
      el.style.width=sh>0?`${(st/sh)*100}%`:"0%";
    };
    window.addEventListener("scroll",update);
    return()=>window.removeEventListener("scroll",update);
  },[]);

  React.useEffect(()=>{
    const ld=document.getElementById("app-loader");
    if(ld) setTimeout(()=>ld.classList.add("hidden"),900);
  },[]);

  return(
    <>
      <Header count={count} cart={cart} page={page} setPage={setPage}/>
      {page==="home"&&<HomePage cart={cart} addToCart={addToCart} setPage={setPage} showToast={showToast}/>}
      {page==="cart"&&<CartPage cart={cart} updateQty={updateQty} removeItem={removeItem} clearCart={clearCart} setPage={setPage} showToast={showToast}/>}
      {page==="home"&&<StickyCart cart={cart} setPage={setPage}/>}
      <Toast toast={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
